name: Run Textlint

on:
  push:
    branches:
      - main
      - feature/**
    paths:
      - 'content/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run Textlint
        run: npx textlint content/**
